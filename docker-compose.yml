services:
  osmolingo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osmolingo-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3007"
    ports:
      - "3007:3007"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3007/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
